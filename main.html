<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== ENCABEZADO ===== -->
  <header class="header">
    <!-- Botón toggle panel izquierdo (solo móvil) -->
    <button class="panel-toggle panel-toggle--left" id="toggle-left" aria-label="Filtrar por tipo">⚔</button>

    <img
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
      alt="Pokeball"
      class="header__ball"
    />
    <h1 class="header__title">Pokédex</h1>

    <!-- Botón toggle panel derecho (solo móvil) -->
    <button class="panel-toggle panel-toggle--right" id="toggle-right" aria-label="Ver lista">☰</button>
  </header>

  <!-- ===== LAYOUT DE 3 COLUMNAS ===== -->
  <div class="layout">

    <!-- ===== PANEL IZQUIERDO: FILTRO POR TIPO ===== -->
    <aside class="panel panel--left" id="panel-left">
      <h2 class="panel__title">Tipos</h2>
      <div id="type-filter" class="type-filter">
        <button class="type-btn active" data-type="all">Todos</button>
      </div>
    </aside>

    <!-- ===== CONTENIDO CENTRAL ===== -->
    <main class="main" id="main-content">

      <!-- ===== SECCIÓN DE BÚSQUEDA ===== -->
      <section class="search">
        <input
          type="text"
          id="search-input"
          class="search__input"
          placeholder="Nombre o número..."
        />
        <button id="search-btn" class="btn btn--primary">Buscar</button>
        <button id="reset-btn" class="btn btn--secondary">Ver todos</button>
      </section>

      <!-- ===== MENSAJE DE ERROR ===== -->
      <div id="error-msg" class="error hidden"></div>

      <!-- ===== CUADRÍCULA DE POKÉMON ===== -->
      <section id="pokemon-grid" class="grid"></section>

      <!-- ===== PAGINACIÓN ===== -->
      <div class="pagination" id="pagination">
        <button id="prev-btn" class="btn btn--pag" disabled>←</button>
        <span id="page-info" class="pagination__info">Pág 1</span>
        <button id="next-btn" class="btn btn--pag">→</button>
      </div>

    </main>

    <!-- ===== PANEL DERECHO: LISTA ALFABÉTICA ===== -->
    <aside class="panel panel--right" id="panel-right">
      <h2 class="panel__title">Lista</h2>
      <div id="alpha-filter" class="alpha-filter"></div>
      <ul id="pokemon-list" class="pokemon-list">
        <li class="list-loading">Cargando...</li>
      </ul>
    </aside>

  </div>

  <!-- ===== OVERLAY para cerrar paneles en móvil ===== -->
  <div class="overlay hidden" id="overlay"></div>

  <!-- ===== MODAL DE DETALLE ===== -->
  <div id="modal" class="modal hidden">
    <div class="modal__content">
      <button id="modal-close" class="modal__close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
